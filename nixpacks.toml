# Railway (Nixpacks) build for THE BOSS — web + doctor dashboard.
#
# Install must INCLUDE optional dependencies: Tailwind v4's lightningcss and
# @tailwindcss/oxide (plus sharp and @next/swc) ship their platform-native
# `.node` binaries as OPTIONAL deps, and `next build` needs them. Omitting
# optional deps breaks the build with "Cannot find module lightningcss.*.node".
#
# The only heavy optional dep we don't want is Chromium (pulled by
# whatsapp-web.js -> puppeteer for the booking bot, which is NOT deployed here).
# PUPPETEER_SKIP_DOWNLOAD stops that ~150 MB download while still installing the
# native build binaries above.
#
# devDependencies are force-included because Railway builds with
# NODE_ENV=production (npm would otherwise omit tailwind + typescript).
#
# NEXT_PUBLIC_CLINIC is inlined into the client bundle at build time. Turbopack's
# incremental cache (.next/cache, a Railway build-cache mount) can reuse the old
# compiled modules when only that env var changes, so a redeploy would keep the
# previous clinic's branding. We wipe .next/cache before building so every deploy
# recompiles with the CURRENT clinic value. Correctness > a few seconds of cache.
#
# The start command + healthcheck live in railway.json.

[variables]
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
NEXT_TELEMETRY_DISABLED = "1"

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
dependsOn = ["install"]
cmds = ["npx prisma generate", "rm -rf .next/cache && npm run build"]
